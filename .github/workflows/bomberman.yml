name: generate arcade contribution graphs

on:
    schedule:
        - cron: '0 0 * * *'
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
    generate:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: install pacman-contribution-graph
              run: npm install -g pacman-contribution-graph

            - name: create dist directory
              run: mkdir -p dist

            - name: generate bomberman with full scenario (light)
              run: |
                  pacman-contribution-graph \
                    --game bomberman \
                    --platform scenario \
                    --username ${{ github.repository_owner }} \
                    --gameTheme github \
                    --scenario full \
                    --output dist/bomberman-contribution-graph.svg

            - name: generate bomberman with full scenario (dark)
              run: |
                  pacman-contribution-graph \
                    --game bomberman \
                    --platform scenario \
                    --username ${{ github.repository_owner }} \
                    --gameTheme github-dark \
                    --scenario full \
                    --output dist/bomberman-contribution-graph-dark.svg

            - name: push SVGs to the output branch
              uses: crazy-max/ghaction-github-pages@v3.1.0
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
