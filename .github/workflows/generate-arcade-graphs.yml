name: generate arcade contribution graphs

on:
    schedule:
        - cron: '0 0 * * *'
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
    generate:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            # ═══════════════════════════════════════════════════
            # 📥 CHECKOUT DEL REPOSITORIO (FALTABA ESTO)
            # ═══════════════════════════════════════════════════
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: install pacman-contribution-graph
              run: npm install -g pacman-contribution-graph

            - name: create dist directory
              run: mkdir -p dist

            # ═══════════════════════════════════════════════════
            # 🍒 PAC-MAN
            # ═══════════════════════════════════════════════════
            - name: generate pacman (light)
              run: |
                  pacman-contribution-graph \
                    --game pacman \
                    --platform github \
                    --username ${{ github.repository_owner }} \
                    --gameTheme github \
                    --scenario random \
                    --output dist/pacman-contribution-graph.svg

            - name: generate pacman (dark)
              run: |
                  pacman-contribution-graph \
                    --game pacman \
                    --platform github \
                    --username ${{ github.repository_owner }} \
                    --gameTheme github-dark \
                    --scenario random \
                    --output dist/pacman-contribution-graph-dark.svg

            # ═══════════════════════════════════════════════════
            # 💣 BOMBERMAN
            # ═══════════════════════════════════════════════════
            - name: generate bomberman (light)
              run: |
                  pacman-contribution-graph \
                    --game bomberman \
                    --platform github \
                    --username ${{ github.repository_owner }} \
                    --gameTheme github \
                    --scenario random \
                    --output dist/bomberman-contribution-graph.svg

            - name: generate bomberman (dark)
              run: |
                  pacman-contribution-graph \
                    --game bomberman \
                    --platform github \
                    --username ${{ github.repository_owner }} \
                    --gameTheme github-dark \
                    --scenario random \
                    --output dist/bomberman-contribution-graph-dark.svg

            # ═══════════════════════════════════════════════════
            # 🚀 GALAGA
            # ═══════════════════════════════════════════════════
            - name: generate galaga (light)
              run: |
                  pacman-contribution-graph \
                    --game galaga \
                    --platform github \
                    --username ${{ github.repository_owner }} \
                    --gameTheme github \
                    --scenario random \
                    --output dist/galaga-contribution-graph.svg

            - name: generate galaga (dark)
              run: |
                  pacman-contribution-graph \
                    --game galaga \
                    --platform github \
                    --username ${{ github.repository_owner }} \
                    --gameTheme github-dark \
                    --scenario random \
                    --output dist/galaga-contribution-graph-dark.svg

            # ═══════════════════════════════════════════════════
            # 📤 Push SVGs a la rama output
            # ═══════════════════════════════════════════════════
            - name: push SVGs to the output branch
              uses: crazy-max/ghaction-github-pages@v3.1.0
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
